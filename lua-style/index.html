<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luaスタイルガイド 練習問題 | ロブジム</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- CodeMirror 6: ESM via jspm.io (dependency dedup handled by scopes) -->
    <script type="importmap">
    {
        "imports": {
            "codemirror": "https://ga.jspm.io/npm:codemirror@6.0.1/dist/index.js",
            "@codemirror/state": "https://ga.jspm.io/npm:@codemirror/state@6.5.4/dist/index.js",
            "@codemirror/view": "https://ga.jspm.io/npm:@codemirror/view@6.39.13/dist/index.js",
            "@codemirror/commands": "https://ga.jspm.io/npm:@codemirror/commands@6.10.2/dist/index.js",
            "@codemirror/language": "https://ga.jspm.io/npm:@codemirror/language@6.12.1/dist/index.js",
            "@codemirror/theme-one-dark": "https://ga.jspm.io/npm:@codemirror/theme-one-dark@6.1.2/dist/index.js",
            "@codemirror/legacy-modes/mode/lua": "https://ga.jspm.io/npm:@codemirror/legacy-modes@6.5.2/mode/lua.js"
        },
        "scopes": {
            "https://ga.jspm.io/": {
                "@codemirror/autocomplete": "https://ga.jspm.io/npm:@codemirror/autocomplete@6.20.0/dist/index.js",
                "@codemirror/lint": "https://ga.jspm.io/npm:@codemirror/lint@6.9.3/dist/index.js",
                "@codemirror/search": "https://ga.jspm.io/npm:@codemirror/search@6.6.0/dist/index.js",
                "@lezer/common": "https://ga.jspm.io/npm:@lezer/common@1.5.1/dist/index.js",
                "@lezer/highlight": "https://ga.jspm.io/npm:@lezer/highlight@1.2.3/dist/index.js",
                "@marijn/find-cluster-break": "https://ga.jspm.io/npm:@marijn/find-cluster-break@1.0.2/src/index.js",
                "crelt": "https://ga.jspm.io/npm:crelt@1.0.6/index.js",
                "style-mod": "https://ga.jspm.io/npm:style-mod@4.1.3/src/style-mod.js",
                "w3c-keyname": "https://ga.jspm.io/npm:w3c-keyname@2.2.8/index.js"
            }
        }
    }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<!-- ① ヘッダー -->
<header class="header">
    <h1>Luaスタイルガイド 練習問題</h1>
    <div class="subtitle">ロブジム・ゲームクリエイタースクール</div>
</header>

<main class="container">

    <!-- ② レッスン選択 -->
    <section class="card">
        <div class="lesson-select-wrap">
            <label for="lessonSelect">レッスン:</label>
            <select id="lessonSelect">
                <option>読み込み中…</option>
            </select>
        </div>
    </section>

    <!-- ③ 問題文エリア -->
    <section class="card">
        <h2>問題</h2>
        <p id="description" class="description">読み込み中…</p>
    </section>

    <!-- ④ コードエディタ -->
    <section class="card">
        <h2>コードエディタ</h2>
        <div id="editor" class="editor-wrap"></div>
    </section>

    <!-- ヒント（アコーディオン） -->
    <details class="card hint-accordion">
        <summary class="hint-summary">ヒント</summary>
        <div id="rules" class="rules"></div>
    </details>

    <!-- ⑤ 添削ボタン -->
    <div class="btn-area">
        <button id="reviewBtn" type="button">
            <span class="spinner"></span>
            添削する
        </button>
    </div>

    <!-- ⑥ 添削結果エリア -->
    <section id="resultArea" class="card">
        <h2>添削結果</h2>
        <div id="resultContent" class="result-content"></div>
    </section>

</main>

<footer class="footer">
    &copy; ロブジム・ゲームクリエイタースクール
</footer>

<!-- App (ES Module) -->
<script type="module" src="js/app.js"></script>

</body>
</html>
